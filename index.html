<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניתוח מניות מתקדמת</title>
    <!-- Tailwind CSS לעיצוב מקצועי -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f1f5f9; /* אפור סלייט בהיר */
        }
        .bg-finance-primary { background-color: #0f172a; } /* כחול כהה עמוק */
        .bg-finance-accent { background-color: #334155; } /* אפור סלייט כהה */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
        <!-- כותרת עליונה -->
        <div class="bg-finance-primary p-10 text-center text-white">
            <h1 class="text-3xl font-bold mb-2">מערכת אחזור וגיבוי נתונים</h1>
            <p class="text-slate-400 text-sm">שליפה מ-Yahoo Finance עם גיבוי אוטומטי מ-Google Finance</p>
        </div>

        <div class="p-8">
            <form id="stockForm" class="space-y-6">
                <!-- שדה סימולי מניות -->
                <div>
                    <label class="block text-slate-700 font-bold mb-2" for="tickers">סימולי מניות (מופרדים בפסיק):</label>
                    <input type="text" id="tickers" name="tickers" 
                        class="w-full px-4 py-4 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition text-lg"
                        placeholder="למשל: AAPL, TSLA, MSFT" required>
                </div>

                <!-- תאריכים -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-slate-700 font-bold mb-2" for="startDate">תאריך התחלה:</label>
                        <input type="date" id="startDate" name="startDate" 
                            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-slate-700 font-bold mb-2" for="endDate">תאריך סיום:</label>
                        <input type="date" id="endDate" name="endDate" 
                            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none" required>
                    </div>
                </div>

                <!-- בחירת תדירות -->
                <div>
                    <label class="block text-slate-700 font-bold mb-2" for="frequency">תדירות נתונים:</label>
                    <select id="frequency" name="frequency" 
                        class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none bg-white cursor-pointer">
                        <option value="Daily">יומי (Daily)</option>
                        <option value="Weekly">שבועי (Weekly)</option>
                        <option value="Monthly">חודשי (Monthly)</option>
                    </select>
                </div>

                <!-- כפתור שליחה -->
                <button type="submit" id="submitBtn" 
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-5 rounded-2xl shadow-lg transition duration-300 flex items-center justify-center text-xl">
                    <span id="btnText">הפק דוח נתונים</span>
                    <div id="loaderIcon" class="hidden loader"></div>
                </button>
            </form>

            <!-- אזור תוצאה (מוסתר כברירת מחדל) -->
            <div id="resultArea" class="hidden mt-10 text-center border-t border-slate-100 pt-8 animate-fade-in">
                <div class="bg-green-50 border border-green-200 rounded-2xl p-6">
                    <p class="text-green-800 font-bold mb-4">הקובץ נוצר בהצלחה!</p>
                    <a id="sheetLink" href="#" target="_blank" 
                        class="inline-block w-full bg-finance-accent hover:bg-slate-900 text-white font-bold py-5 px-10 rounded-2xl shadow-xl transition transform hover:scale-105 text-lg">
                        פתח את גיליון הנתונים החדש
                    </a>
                </div>
            </div>

            <!-- הודעת שגיאה -->
            <div id="errorArea" class="hidden mt-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-xl text-center font-medium">
            </div>
        </div>
    </div>

    <script>
        // כתובת הסקריפט החדשה שסיפקת
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwmL1Idexyp73JMF_ViY3hTZCpc6RmrlmwGI41yfO3_HyvxG8qn4MgWAahgRBkLq-Li/exec';

        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loaderIcon = document.getElementById('loaderIcon');
        const resultArea = document.getElementById('resultArea');
        const sheetLink = document.getElementById('sheetLink');
        const errorArea = document.getElementById('errorArea');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // איפוס מצב תצוגה
            errorArea.classList.add('hidden');
            resultArea.classList.add('hidden');
            
            // עדכון כפתור למצב טעינה
            submitBtn.disabled = true;
            btnText.innerText = "טוען נתונים...";
            loaderIcon.classList.remove('hidden');

            // בניית הנתונים לשליחה - תואם לסקריפט החדש
            const payload = {
                tickers: document.getElementById('tickers').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8' // עקיפת CORS ב-Apps Script
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.status === "success" && data.sheetUrl) {
                    // הצגת התוצאה
                    sheetLink.href = data.sheetUrl;
                    resultArea.classList.remove('hidden');
                } else {
                    // הצגת הודעת שגיאה מהשרת
                    errorArea.innerText = "שגיאת שרת: " + (data.message || "לא ניתן היה לעבד את הנתונים.");
                    errorArea.classList.remove('hidden');
                }

            } catch (error) {
                console.error('Error:', error);
                errorArea.innerText = "אירעה שגיאת תקשורת. וודא שהסקריפט מוגדר כ-'Anyone' (ציבורי).";
                errorArea.classList.remove('hidden');
            } finally {
                // החזרת הכפתור למצב רגיל
                submitBtn.disabled = false;
                btnText.innerText = "הפק דוח נתונים";
                loaderIcon.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
