<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניתוח מניות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f8fafc; /* רקע אפור סלייט בהיר מאוד */
        }
        .financial-blue { background-color: #1e3a8a; } /* כחול כהה פיננסי */
        .financial-slate { background-color: #334155; } /* אפור סלייט מקצועי */
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white shadow-2xl rounded-3xl overflow-hidden border border-slate-200">
        <div class="financial-blue p-8 text-center">
            <h1 class="text-2xl font-bold text-white mb-2">מערכת אחזור נתונים פיננסיים</h1>
            <p class="text-blue-100 text-sm opacity-80 italic">פלטפורמה מבוססת ענן לניתוח שוק</p>
        </div>

        <div class="p-8">
            <form id="stockRequestForm" class="space-y-6">
                <div>
                    <label class="block text-slate-700 font-semibold mb-2" for="tickerList">רשימת סימולי מניות:</label>
                    <input type="text" id="tickerList" name="tickerList" 
                        class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                        placeholder="למשל: TSLA, AAPL, AMZN" required>
                    <p class="text-xs text-slate-400 mt-1">הפרד בין הסימולים באמצעות פסיק</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-slate-700 font-semibold mb-2" for="startDate">תאריך התחלה:</label>
                        <input type="date" id="startDate" name="startDate" 
                            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-slate-700 font-semibold mb-2" for="endDate">תאריך סיום:</label>
                        <input type="date" id="endDate" name="endDate" 
                            class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                </div>

                <div>
                    <label class="block text-slate-700 font-semibold mb-2" for="frequency">תדירות נתונים:</label>
                    <select id="frequency" name="frequency" 
                        class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white cursor-pointer">
                        <option value="Daily">יומי (Daily)</option>
                        <option value="Weekly">שבועי (Weekly)</option>
                        <option value="Monthly">חודשי (Monthly)</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full financial-blue hover:bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg transition duration-300 flex items-center justify-center">
                    <span id="btnText">שלח בקשה</span>
                    <div id="loader" class="hidden ml-3 border-2 border-white border-t-transparent rounded-full w-5 h-5 animate-spin"></div>
                </button>
            </form>

            <div id="successArea" class="hidden mt-8 text-center border-t border-slate-100 pt-8">
                <p class="text-green-600 font-semibold mb-4 text-sm">הנתונים הוכנו בהצלחה!</p>
                <a id="sheetUrlBtn" href="#" target="_blank" 
                    class="block w-full financial-slate hover:bg-slate-800 text-white font-bold py-5 rounded-2xl shadow-xl transition transform hover:scale-105 text-lg">
                    פתיחת הגיליון בטאב חדש
                </a>
            </div>

            <div id="errorArea" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-xl text-sm border border-red-100 text-center">
                אירעה שגיאה בעיבוד הנתונים. נסה שוב מאוחר יותר.
            </div>
        </div>
    </div>

    <script>
        // כתובת ה-Web App של Google Apps Script
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyFnv4qBX_YSmUulsAOywe0puNstkiTn7-fIF1Pulo/dev';

        const form = document.getElementById('stockRequestForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const successArea = document.getElementById('successArea');
        const sheetUrlBtn = document.getElementById('sheetUrlBtn');
        const errorArea = document.getElementById('errorArea');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // איפוס מצב התצוגה לפני שליחה
            errorArea.classList.add('hidden');
            successArea.classList.add('hidden');
            
            // עדכון הממשק למצב טעינה
            submitBtn.disabled = true;
            btnText.innerText = "טוען נתונים...";
            loader.classList.remove('hidden');

            // איסוף הנתונים מהשדות
            const payload = {
                tickers: document.getElementById('tickerList').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            try {
                // שליחת הבקשה ב-fetch
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        // Header מיוחד למניעת שגיאות CORS מול Apps Script
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify(payload)
                });

                // ניסיון לקרוא את התגובה כ-JSON
                const data = await response.json();

                if (data && data.sheetUrl) {
                    // עדכון כפתור הלינק והצגתו
                    sheetUrlBtn.href = data.sheetUrl;
                    successArea.classList.remove('hidden');
                } else {
                    throw new Error("Missing sheetUrl");
                }

            } catch (err) {
                console.error("Fetch Error:", err);
                errorArea.classList.remove('hidden');
            } finally {
                // החזרת הכפתור למצב רגיל
                submitBtn.disabled = false;
                btnText.innerText = "שלח בקשה";
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
